[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback so deep links like /tickets/<id> work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled: post EOD report link to GroupMe at 11:59 PM Eastern (04:59 UTC next day)
[functions."eod-scheduled"]
  schedule = "59 4 * * *"
