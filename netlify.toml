[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback so deep links like /tickets/<id> work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled: post previous day's EOD report link to GroupMe at 2 AM Eastern (7 AM UTC)
[functions."eod-scheduled"]
  schedule = "0 7 * * *"
